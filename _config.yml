title: Kursseite Demo
tagline: Built with Decap CMS
description: A minimal, responsive and feature-rich Jekyll theme for technical writing.
baseurl: /Kursseite-Demo
url: https://Region-Azur.github.io/Kursseite-Demo
author: Region AZUR
social:
  name: Region AZUR
  links:
    - https://region-azur.ch
theme: jekyll-theme-chirpy
lang: en
timezone: Europe/Zurich
pwa:
  enabled: true
  cache:
    deny_paths: []
include:
  - _tabs
  - content
  - _plugins
defaults:
  - scope:
      path: content
    values:
      layout: content_page
      toc: true
      panel_includes:
        - toc
      permalink: /:basename
collections:
  tabs:
    output: true
